# O container corre systemd porque o snapd (necessário para o
# snapcraft e o ubuntu-image) só funciona como serviço de sistema.
# A configuração do pipeline vive em workspace/.env e é lida pelo
# próprio pipeline.sh em runtime — não é injetada pelo compose,
# para evitar valores obsoletos quando o .env muda.
services:
  core-builder:
    build: .
    container_name: ubuntu-core-builder
    privileged: true
    cgroup: host
    volumes:
      - ./workspace:/workspace
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /sys/kernel/security:/sys/kernel/security:rw
    tmpfs:
      - /run
      - /run/lock
      - /tmp
      - /var/lib/snapd
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    restart: unless-stopped
